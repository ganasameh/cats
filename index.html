<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gana's World</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* --- CSS STYLES --- */
        :root {
            --soft-pink: #ffdae9;
            --dark-pink: #ff85b3;
            --accent-pink: #f8bbd0;
        }

        body {
            background-color: var(--soft-pink);
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
            /* Custom Cat Paw Cursor */
            cursor: url('https://cur.cursors-4u.net/nature/nat-10/nat984.cur'), auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Moving Cats Containers */
        .cat-bubble {
            position: absolute;
            background: white;
            padding: 10px;
            border-radius: 20px;
            border: 2px solid var(--dark-pink);
            font-weight: bold;
            color: var(--dark-pink);
            animation: float 4s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        #cat1 { top: 10%; left: 10%; }
        #cat2 { top: 15%; right: 10%; }

        /* Main Header */
        h1 {
            font-family: 'Orbitron', sans-serif;
            color: var(--dark-pink);
            font-size: 3rem;
            text-shadow: 2px 2px white;
            margin-top: 100px;
        }

        /* Input Section */
        .input-container {
            margin-top: 20px;
            text-align: center;
        }

        input[type="text"] {
            padding: 15px;
            width: 300px;
            border-radius: 25px;
            border: 3px solid var(--dark-pink);
            font-size: 1.2rem;
            outline: none;
        }

        /* Categories Section (Hidden by default) */
        #categories {
            display: none;
            margin-top: 40px;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .category-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            border: 2px dashed var(--dark-pink);
            cursor: pointer;
            transition: transform 0.3s;
            font-weight: bold;
        }

        .category-card:hover {
            transform: scale(1.1);
            background: var(--accent-pink);
        }

        /* Image Display Area */
        #gallery {
            margin-top: 30px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px;
        }

        .item-img {
            width: 150px;
            height: 150px;
            border-radius: 10px;
            border: 3px solid white;
            object-fit: cover;
        }

        /* Random Commenting Cats */
        .comment-cat {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            border: 2px solid var(--dark-pink);
            padding: 10px;
            border-radius: 10px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div id="cat1" class="cat-bubble">🐱 Gana is at ur help!</div>
    <div id="cat2" class="cat-bubble">😸 What is Gana up to?</div>

    <h1>WELCOME TO GANA'S WEBSITE!</h1>

    <div class="input-container" id="input-section">
        <input type="text" id="userName" placeholder="Type your name and press Enter..." onkeydown="handleEnter(event)">
    </div>

    <div id="categories">
        <div class="category-card" onclick="showGallery('supplies')">1- School Supplies</div>
        <div class="category-card" onclick="showGallery('books')">2- School Books</div>
        <div class="category-card" onclick="showGallery('bags')">3- School Bags</div>
        <div class="category-card" onclick="showGallery('pencilcases')">4- Pencil Cases</div>
    </div>

    <div id="gallery"></div>

    <div class="comment-cat" id="commentBox">Gana Sameh is so talented! ✨</div>

    <script>
        /* --- JAVASCRIPT LOGIC --- */
        
        // 1. Handle Name Entry
        function handleEnter(event) {
            if (event.key === "Enter") {
                document.getElementById('input-section').style.display = 'none';
                document.getElementById('categories').style.display = 'flex';
                startCatComments();
            }
        }

        // 2. Show Images Based on Category
        function showGallery(type) {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = ""; // Clear old images
            
            // Placeholder images (In GitHub, replace these URLs with your actual image paths)
            const images = {
                supplies: ["https://placehold.co/150x150?text=Notebook", "https://placehold.co/150x150?text=Erasers"],
                books: ["https://placehold.co/150x150?text=Math+Book", "https://placehold.co/150x150?text=Art+Book"],
                bags: ["https://placehold.co/150x150?text=Pink+Bag", "https://placehold.co/150x150?text=Cat+Bag"],
                pencilcases: ["https://placehold.co/150x150?text=Glitter+Case", "https://placehold.co/150x150?text=Fluffy+Case"]
            };

            images[type].forEach(src => {
                const img = document.createElement('img');
                img.src = src;
                img.className = 'item-img';
                gallery.appendChild(img);
            });
        }

        // 3. Random Comments about Gana Sameh
        const comments = [
            "Gana Sameh is the best coder! 🎀",
            "Gana Sameh has the cutest style! 🐾",
            "Wow, Gana Sameh made this herself? 🌟",
            "Gana Sameh is so smart! 🐱",
            "I love Gana Sameh's website! ✨"
        ];

        function startCatComments() {
            setInterval(() => {
                const randomComment = comments[Math.floor(Math.random() * comments.length)];
                document.getElementById('commentBox').innerText = "🐱: " + randomComment;
            }, 3000);
        }
    </script>
</body>
</html>
